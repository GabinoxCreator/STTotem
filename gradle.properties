# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8
kotlin.code.style=official
android.useAndroidX=true
android.enableJetifier=true

# Ignora bibliotecas locais do Jetifier para evitar o erro de NoSuchFileException (AndroidManifest.xml)
android.jetifier.ignorelist=clisitef.*|EasyLayer.*|DecodeLibrary.*|image-1.9.5.*|4.0.2-release.*

kotlin.daemon.jvmargs=-Xmx2g
kotlin.compiler.execution.strategy=in-process

# Melhora a compatibilidade com recursos de AARs locais
android.nonTransitiveRClass=false
